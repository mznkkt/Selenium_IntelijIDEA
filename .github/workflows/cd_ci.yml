name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ----- ДОБАВЛЕННЫЕ ШАГИ ДЛЯ SELENIUM С working-directory -----
    - name: Start Selenium container via Docker Compose
      working-directory: ./Pet_Project   # <-- переходим в папку проекта
      run: docker compose up -d

    - name: Wait for Selenium Grid to be ready
      run: |
        echo "Waiting for Selenium on port 8989..."
        for i in {1..30}; do
          if curl -s http://localhost:8989/status | grep -q '"ready":true'; then
            echo "Selenium is ready!"
            exit 0
          fi
          echo "Attempt $i/30 - still waiting..."
          sleep 2
        done
        echo "Selenium did not become ready in time"
        exit 1
      # этот шаг не требует working-directory, т.к. не обращается к файлам проекта

    - name: Run tests with Maven
      working-directory: ./Pet_Project   # <-- запускаем Maven внутри Pet_Project
      run: mvn clean test

    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: Pet_Project/screenshot/    # <-- путь относительно корня репозитория

    - name: Stop and remove containers
      if: always()
      working-directory: ./Pet_Project
      run: docker compose down

    # Опционально: если dependency graph относится только к Pet_Project, можно оставить как есть
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
      with:
        working-directory: ./Pet_Project   # если поддерживается
