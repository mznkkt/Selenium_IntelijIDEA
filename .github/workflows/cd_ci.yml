name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ----- ДОБАВЛЕННЫЕ ШАГИ ДЛЯ SELENIUM -----
    - name: Start Selenium container via Docker Compose
      run: docker compose up -d

    - name: Wait for Selenium Grid to be ready
      run: |
        echo "Waiting for Selenium on port 8989..."
        for i in {1..30}; do
          if curl -s http://localhost:8989/status | grep -q '"ready":true'; then
            echo "Selenium is ready!"
            exit 0
          fi
          echo "Attempt $i/30 - still waiting..."
          sleep 2
        done
        echo "Selenium did not become ready in time"
        exit 1

    # Заменили package на test (вам нужен запуск тестов)
    - name: Run tests with Maven
      run: mvn clean test

    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: screenshot/

    # Остановка контейнера (всегда, даже если тесты упали)
    - name: Stop and remove containers
      if: always()
      run: docker compose down
    # ----- КОНЕЦ ДОБАВЛЕННЫХ ШАГОВ -----

    # Опционально: загрузка dependency graph (можно оставить)
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
