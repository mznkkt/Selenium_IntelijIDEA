name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
       java-version: '23'
       distribution: 'oracle'
       cache: maven

    # ----- ДОБАВЛЕННЫЕ ШАГИ ДЛЯ SELENIUM С working-directory -----
    - name: Start Selenium container via Docker Compose
      working-directory: ./Pet_Project   # <-- переходим в папку проекта
      run: docker compose -f docker-compose.yml up -d

    - name: Wait for Selenium Grid to be ready
      run: |
       echo "Waiting for Selenium on port 8989..."
       for i in {1..90}; do
       # Проверяем доступность /wd/hub/status (более стабильный эндпоинт)
       if curl -s -f http://localhost:8989/wd/hub/status; then
        echo "Selenium is ready!"
        exit 0
       fi
       echo "Attempt $i/90 - still waiting..."
       sleep 2
       done
       echo "Selenium did not become ready in time"
       echo "=== Container logs ==="
       docker logs selenium-chrome
       exit 1
       
    - name: Run tests with Maven
      working-directory: ./Pet_Project   # <-- запускаем Maven внутри Pet_Project
      run: mvn clean test

    - name: List allure-results contents
      run: |
       ls -la Pet_Project/target/allure-results/ || echo "No allure-results directory"
       find Pet_Project/target/allure-results -name "*.json" || echo "No JSON files"

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
          name: debug
          path: |
            Pet_Project/debug_screenshot.png
            Pet_Project/debug_page.html
      
    - name: Download Allure CLI
      run: |
       curl -o allure.zip -L https://github.com/allure-framework/allure2/releases/download/2.33.0/allure-2.33.0.zip
       unzip allure.zip -d /tmp/
       echo "/tmp/allure-2.33.0/bin" >> $GITHUB_PATH

    - name: Generate Allure Report
      run: allure generate Pet_Project/target/allure-results --clean -o Pet_Project/target/allure-report

    - name: Upload Allure Report artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: Pet_Project/target/allure-report
        
    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: Pet_Project/screenshot/    # <-- путь относительно корня репозитория
  

    - name: Stop and remove containers
      if: always()
      working-directory: ./Pet_Project
      run: docker compose -f docker-compose.yml down
