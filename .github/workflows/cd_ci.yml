name: Java CI with Maven


on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# ----- ДОБАВЛЕНО: Права для автоматической публикации сайта -----
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
       java-version: '23'
       distribution: 'oracle'
       cache: maven

    # ----- ДОБАВЛЕННЫЕ ШАГИ ДЛЯ SELENIUM С working-directory -----
    - name: Start Selenium container via Docker Compose
      working-directory: ./Pet_Project
      run: docker compose -f docker-compose.yml up -d

    - name: Wait for Selenium Grid to be ready
      run: |
       echo "Waiting for Selenium on port 8989..."
       for i in {1..90}; do
       if curl -s -f http://localhost:8989/wd/hub/status; then
        echo "Selenium is ready!"
        exit 0
       fi
       echo "Attempt $i/90 - still waiting..."
       sleep 2
       done
       echo "Selenium did not become ready in time"
       echo "=== Container logs ==="
       docker logs selenium-chrome
       exit 1
       
    - name: Run tests with Maven
      working-directory: ./Pet_Project
      run: mvn clean test

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
          name: debug
          path: |
            Pet_Project/debug_screenshot.png
            Pet_Project/debug_page.html

    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: Pet_Project/screenshot/

         # ----- СТАБИЛЬНАЯ ГЕНЕРАЦИЯ И ДЕПЛОЙ ALLURE ЧЕРЕЗ NPM -----

    # 1. Скачиваем официальный Allure CLI через встроенный менеджер пакетов npm (быстро и без Java-конфликтов)
    - name: Install Allure CLI
      if: always()
      run: sudo npm install -g allure-commandline --unsafe-perm

    # 2. Скачиваем историю прошлых тестов из ветки gh-pages, если она существует
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: allure-history-temp

    # 3. Копируем прошлую историю в текущие результаты для склейки графиков тренда
    - name: Copy Allure history to results
      if: always()
      run: |
        if [ -d "allure-history-temp/history" ]; then
          cp -r allure-history-temp/history Pet_Project/target/allure-results/
        fi

    # 4. Генерируем свежий HTML-отчет в чистую папку allure-report-site
    - name: Generate Allure Report
      if: always()
      run: allure generate Pet_Project/target/allure-results --clean -o allure-report-site

    # 5. Сохраняем новую историю внутри результатов для сохранения непрерывности тренда
    - name: Save new history trend
      if: always()
      run: |
        cp -r allure-report-site/history Pet_Project/target/allure-results/ || true

    # 6. Автоматически публикуем отчет на GitHub Pages (плагин сам создаст ветку gh-pages)
    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report-site

    # ----- Очистка контейнеров -----
    - name: Stop and remove containers
      if: always()
      working-directory: ./Pet_Project
      run: docker compose -f docker-compose.yml down
