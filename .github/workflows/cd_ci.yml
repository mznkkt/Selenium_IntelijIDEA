name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# ----- ДОБАВЛЕНО: Права для автоматической публикации сайта -----
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
       java-version: '23'
       distribution: 'oracle'
       cache: maven

    # ----- ДОБАВЛЕННЫЕ ШАГИ ДЛЯ SELENIUM С working-directory -----
    - name: Start Selenium container via Docker Compose
      working-directory: ./Pet_Project
      run: docker compose -f docker-compose.yml up -d

    - name: Wait for Selenium Grid to be ready
      run: |
       echo "Waiting for Selenium on port 8989..."
       for i in {1..90}; do
       if curl -s -f http://localhost:8989/wd/hub/status; then
        echo "Selenium is ready!"
        exit 0
       fi
       echo "Attempt $i/90 - still waiting..."
       sleep 2
       done
       echo "Selenium did not become ready in time"
       echo "=== Container logs ==="
       docker logs selenium-chrome
       exit 1
       
    - name: Run tests with Maven
      working-directory: ./Pet_Project
      run: mvn clean test

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
          name: debug
          path: |
            Pet_Project/debug_screenshot.png
            Pet_Project/debug_page.html

    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-screenshots
        path: Pet_Project/screenshot/

       # ----- ОБНОВЛЕННЫЙ БЛОК: Современная генерация Allure без Java 8 -----
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Allure Report with History
      uses: mgrybyk-org/allure-report-gh-pages-action@v2
      if: always()
      with:
        allure_results: Pet_Project/target/allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history

    # ----- Очистка контейнеров -----
    - name: Stop and remove containers
      if: always()
      working-directory: ./Pet_Project
      run: docker compose -f docker-compose.yml down

