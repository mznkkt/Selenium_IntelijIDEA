appender.0.type = Console
appender.0.name = CONSOLE
appender.0.layout.type = PatternLayout
appender.0.layout.pattern = %p - %m%n


appender.1.type = File
appender.1.name = MAIN
appender.1.fileName = src/test/resources/logs/applog.txt

# Set root logger level to DEBUG and its only appender to SMTP
log4j.rootLogger=DEBUG, SMTP

# SMTP appender configuration
log4j.appender.SMTP=org.apache.log4j.net.SMTPAppender
log4j.appender.SMTP.SMTPHost=smtp.example.com
log4j.appender.SMTP.SMTPPort=25
log4j.appender.SMTP.SMTPUsername=your_username
log4j.appender.SMTP.SMTPPassword=your_password
log4j.appender.SMTP.From=your_email@example.com
log4j.appender.SMTP.To=mznkkt14195@example.com
log4j.appender.SMTP.Subject=Log4j SMTP Appender Example
log4j.appender.SMTP.BufferSize=512
log4j.appender.SMTP.layout=org.apache.log4j.PatternLayout
log4j.appender.SMTP.layout.ConversionPattern=%d{ISO8601} [%t] %-5p %c %x - %m%n


rootLogger.level = DEBUG
rootLogger.appenderRef.0.ref = CONSOLE
rootLogger.appenderRef.0.level = DEBUG
rootLogger.appenderRef.1.ref = MAIN
rootLogger.appenderRef.1.level = DEBUG

logger.0.name = org.example
logger.0.level = DEBUG